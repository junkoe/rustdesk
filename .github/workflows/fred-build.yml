# fred-admin-build.yml
# Place this file in your RustDesk fork at: .github/workflows/fred-admin-build.yml
#
# Builds "Fred Admin" — the admin-side outgoing-only client with session tracking.
# Key differences from fred-build.yml (customer client):
#   - No incoming connections, no baked-in password
#   - Settings: General, Display, About (not locked down)
#   - No phone-home registration — admin is not tracked as a client
#   - Patches desktop_remote_page.dart for session start/heartbeat/end signalling
#   - Normal window size (not shrunk)
#
# Trigger: push to master, or manually via Actions → "Run workflow"
# Runner:  windows-2022 (free for public repos)
# Output:  Fred_Admin.exe  (GitHub Actions artifact, 90-day retention)

name: Build Fred Admin

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RUST_VERSION:    "1.75.0"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION:    "15.0.6"
  VCPKG_COMMIT:    "120deac3062162151622ca4860575a33844ba10b"
  PORTAL_URL:      "https://help.fredtheitguy.com"
  # ── Branding ──────────────────────────────────────────────────────────────
  APP_NAME:        "Fred Admin"
  APP_TITLE:       "Fred IT Admin"

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 150

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout fork with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── Cache: vcpkg binary cache ──────────────────────────────────────────
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-${{ env.VCPKG_COMMIT }}-x64-windows-static
          restore-keys: vcpkg-${{ env.VCPKG_COMMIT }}-

      # ── Cache: Rust registry + build cache ────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ env.RUST_VERSION }}-

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      # ── LLVM ────────────────────────────────────────────────────────────────
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}
          directory: C:\llvm

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:\llvm\bin" >> $env:GITHUB_ENV

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Install Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Flutter precache (Windows)
        run: flutter precache --windows

      # ── Custom Flutter engine (required for RustDesk) ─────────────────────
      - name: Download RustDesk custom Flutter engine
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip" `
            -OutFile "$env:TEMP\rd-engine.zip" `
            -UseBasicParsing

      - name: Install custom Flutter engine
        run: |
          $flutterRoot  = (Get-Command flutter).Source | Split-Path | Split-Path
          $engineDest   = "$flutterRoot\bin\cache\artifacts\engine\windows-x64-release"
          New-Item -ItemType Directory -Force -Path $engineDest | Out-Null
          Expand-Archive -Path "$env:TEMP\rd-engine.zip" -DestinationPath "$env:TEMP\rd-engine" -Force
          Copy-Item -Path "$env:TEMP\rd-engine\*" -Destination $engineDest -Force
          Write-Host "Custom engine installed to $engineDest"

      # ── Flutter dropdown-menu patch (3.24.4/3.24.5) ───────────────────────
      - name: Apply Flutter dropdown patch
        run: |
          $patch = ".github\patches\flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if (Test-Path $patch) {
            $flutterRoot = (Get-Command flutter).Source | Split-Path | Split-Path
            Copy-Item $patch $flutterRoot
            Push-Location $flutterRoot
            git apply "flutter_3.24.4_dropdown_menu_enableFilter.diff" 2>$null || true
            Pop-Location
            Write-Host "Flutter patch applied"
          } else {
            Write-Host "Patch file not found — skipping"
          }

      # ── vcpkg ───────────────────────────────────────────────────────────────
      - name: Setup vcpkg at pinned commit
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgDirectory: C:\vcpkg

      - name: Install vcpkg dependencies (x64-windows-static)
        run: |
          C:\vcpkg\vcpkg install `
            --triplet x64-windows-static `
            --x-install-root="C:\vcpkg\installed"
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static

      # ── Add ureq HTTP client ─────────────────────────────────────────────
      - name: Add ureq to Cargo.toml
        shell: pwsh
        run: |
          $cargo = Get-Content "Cargo.toml" -Raw
          if ($cargo -notmatch '"ureq"') {
            $cargo = $cargo -replace '(\[dependencies\])', "[dependencies]`nureq = { version = `"2`", features = [`"tls`"] }"
            $cargo | Set-Content "Cargo.toml" -Encoding utf8
            Write-Host "Added ureq to Cargo.toml"
          } else {
            Write-Host "ureq already present"
          }

      # ── Patch src/common.rs: relay server + options only ─────────────────
      # Admin client sets relay/key/options but does NOT phone-home or register
      # as a customer client. No permanent password baked in.
      - name: Patch src/common.rs (relay server + options)
        shell: pwsh
        env:
          RUSTDESK_HOST: ${{ secrets.RUSTDESK_HOST }}
          RUSTDESK_KEY:  ${{ secrets.RUSTDESK_KEY }}
        run: |
          $h      = $env:RUSTDESK_HOST
          $k      = $env:RUSTDESK_KEY
          $f      = "src\common.rs"
          $c      = Get-Content $f -Raw
          $before = $c

          $inject = @"

              // ── Fred Admin: compiled-in relay server ─────────────────────────────
              *hbb_common::config::EXE_RENDEZVOUS_SERVER.write().unwrap() = "$h".to_owned();
              if !"$k".is_empty() {
                  hbb_common::config::Config::set_option("key".to_owned(), "$k".to_owned());
              }
              // ── Fred Admin: allow remote config modification ──────────────────────
              hbb_common::config::Config::set_option("allow-remote-config-modification".to_owned(), "Y".to_owned());
              // ── Fred Admin: disable update check notifications ────────────────────
              hbb_common::config::Config::set_option("enable-check-update".to_owned(), "N".to_owned());
              // ── Fred Admin: force dark theme ──────────────────────────────────────
              hbb_common::config::LocalConfig::set_option("theme".to_owned(), "dark".to_owned());
          "@

          $target = [regex]::Match($c, 'pub fn load_custom_client\(\)[^{]*\{').Value
          if (!$target) {
            Write-Error "load_custom_client() not found in $f — function may have been renamed"
            exit 1
          }
          $c = $c.Replace($target, $target + $inject)
          $c | Set-Content $f -Encoding utf8

          if ($c -eq $before) {
            Write-Error "src/common.rs was not modified"
            exit 1
          }
          Write-Host "Patched load_custom_client() in src/common.rs"
          Write-Host "  EXE_RENDEZVOUS_SERVER = $h"

      # ── Generate bridge_generated.rs ─────────────────────────────────────
      - name: Flutter pub get (required before bridge codegen)
        run: flutter pub get
        working-directory: flutter

      - name: Generate flutter_rust_bridge
        shell: pwsh
        env:
          LIBCLANG_PATH: C:\llvm\bin
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          flutter_rust_bridge_codegen `
            --rust-input src/flutter_ffi.rs `
            --dart-output flutter/lib/generated_bridge.dart
          Write-Host "bridge_generated.rs created"

      # ── Python build deps ─────────────────────────────────────────────────
      - name: Install Python build dependencies
        run: python -m pip install --quiet requests argparse

      # ── Branding ─────────────────────────────────────────────────────────
      - name: Apply branding
        shell: pwsh
        run: |
          $name   = "${{ env.APP_NAME }}"
          $title  = "${{ env.APP_TITLE }}"

          # 1. Window title (C++ runner)
          $f = "flutter\windows\runner\main.cpp"
          (Get-Content $f -Raw) -replace 'std::wstring app_name = L"RustDesk"', "std::wstring app_name = L`"$title`"" |
            Set-Content $f -Encoding utf8
          Write-Host "main.cpp: window title → $title"

          # 2. Exe metadata
          $f = "flutter\windows\runner\Runner.rc"
          $bytes = [System.IO.File]::ReadAllBytes($f)
          $enc = if ($bytes[0] -eq 0xFF -and $bytes[1] -eq 0xFE) { [System.Text.Encoding]::Unicode } else { [System.Text.Encoding]::UTF8 }
          $c = $enc.GetString($bytes)
          $c = $c -replace 'VALUE "FileDescription", "RustDesk[^"]*"', "VALUE `"FileDescription`", `"$name`""
          $c = $c -replace 'VALUE "ProductName", "RustDesk[^"]*"',     "VALUE `"ProductName`", `"$name`""
          [System.IO.File]::WriteAllText($f, $c, $enc)
          Write-Host "Runner.rc: product name → $name"

          # 3. Hide update notification card
          $f = "flutter\lib\desktop\pages\desktop_home_page.dart"
          (Get-Content $f -Raw) -replace 'bind\.mainGetNewVersion\(\)\.isNotEmpty', 'false' |
            Set-Content $f -Encoding utf8
          Write-Host "desktop_home_page.dart: update notification card hidden"

          # 4. Icon — admin clients share the same branding assets
          if (Test-Path "assets\app_icon.ico") {
            Copy-Item "assets\app_icon.ico" "flutter\windows\runner\resources\app_icon.ico" -Force
            Copy-Item "assets\app_icon.ico" "res\icon.ico" -Force
            Write-Host "Icon: replaced"
          }
          if (Test-Path "assets\polished_logo.svg") {
            Copy-Item "assets\polished_logo.svg" "flutter\assets\icon.svg" -Force
            Write-Host "SVG icon: replaced"
          }

      # ── Admin settings tabs: General, Display, About ──────────────────────
      # Customer client locks down to General + About only.
      # Admin needs Display settings (codec, resolution, DPI) for remote work.
      - name: Configure settings tabs (General, Display, About)
        shell: pwsh
        run: |
          $f = "flutter\lib\desktop\pages\desktop_setting_page.dart"
          $c = Get-Content $f -Raw
          $before = $c
          $startMark = 'static final List<SettingsTabKey> tabKeys = ['
          $startIdx  = $c.IndexOf($startMark)
          if ($startIdx -ge 0) {
            $endIdx = $c.IndexOf('];', $startIdx)
            if ($endIdx -ge 0) {
              $newList = $startMark + "`n    SettingsTabKey.general,`n    SettingsTabKey.display,`n    SettingsTabKey.about,`n  ];"
              $c = $c.Substring(0, $startIdx) + $newList + $c.Substring($endIdx + 2)
            }
          }
          $c | Set-Content $f -Encoding utf8
          if ($c -eq $before) {
            Write-Host "Warning: tabKeys pattern not matched — tabs unchanged"
          } else {
            Write-Host "desktop_setting_page.dart: settings tabs → General, Display, About"
          }

      # ── Patch desktop_remote_page.dart: session tracking ─────────────────
      # Each remote session window is an independent Flutter widget instance.
      # We inject session start/heartbeat/end into _RemotePageState so every
      # open session window independently tracks its own session on the portal.
      - name: Patch desktop_remote_page.dart (session tracking)
        shell: pwsh
        run: |
          $portal = "${{ env.PORTAL_URL }}"
          $f = "flutter\lib\desktop\pages\desktop_remote_page.dart"
          $c = Get-Content $f -Raw
          $before = $c

          # Add required imports if not already present
          if ($c -notmatch "import 'dart:convert'") {
            $c = "import 'dart:convert';`n" + $c
          }
          if ($c -notmatch "import 'dart:async'") {
            $c = "import 'dart:async';`n" + $c
          }
          if ($c -notmatch "package:http/http.dart") {
            $c = "import 'package:http/http.dart' as rdHttp;`n" + $c
          }

          # Inject fields + session methods into _RemotePageState right after
          # the opening brace of the class declaration.
          $classStart = $c.IndexOf('class _RemotePageState extends State<RemotePage>')
          if ($classStart -lt 0) {
            Write-Host "Warning: _RemotePageState not found — session tracking not injected"
          } else {
            $openBrace = $c.IndexOf('{', $classStart)
            $dartInject = @"

  // ── Fred Admin: session tracking fields ──────────────────────────────────
  String? _fsSessionId;
  Timer? _fsHeartbeatTimer;

  void _fsStartSession() async {
    // Brief delay to let RustDesk establish the connection before we record it
    await Future.delayed(const Duration(seconds: 2));
    try {
      final resp = await rdHttp.post(
        Uri.parse('$portal/api/session/start'),
        headers: {'Content-Type': 'application/json'},
        body: jsonEncode({'peer_id': widget.id}),
      );
      if (resp.statusCode == 200) {
        final data = jsonDecode(resp.body) as Map<String, dynamic>;
        _fsSessionId = data['session_id'].toString();
        _fsHeartbeatTimer = Timer.periodic(
          const Duration(seconds: 30),
          (_) => _fsSendHeartbeat(),
        );
      }
    } catch (_) {}
  }

  void _fsSendHeartbeat() async {
    final sid = _fsSessionId;
    if (sid == null) return;
    try {
      await rdHttp.post(
        Uri.parse('$portal/api/session/heartbeat'),
        headers: {'Content-Type': 'application/json'},
        body: jsonEncode({'session_id': int.parse(sid)}),
      );
    } catch (_) {}
  }

  void _fsEndSession() {
    _fsHeartbeatTimer?.cancel();
    _fsHeartbeatTimer = null;
    final sid = _fsSessionId;
    if (sid == null) return;
    _fsSessionId = null;
    // Fire-and-forget: dispose() is synchronous so we cannot await
    rdHttp.post(
      Uri.parse('$portal/api/session/end'),
      headers: {'Content-Type': 'application/json'},
      body: jsonEncode({'session_id': int.parse(sid), 'notes': null}),
    );
  }
  // ── end Fred Admin session tracking ──────────────────────────────────────

"@
            $c = $c.Substring(0, $openBrace + 1) + $dartInject + $c.Substring($openBrace + 1)

            # Call _fsStartSession() after super.initState(); (first occurrence = _RemotePageState)
            $c = [regex]::Replace($c, [regex]::Escape("super.initState();"), "super.initState();`n    _fsStartSession();", 1)

            # Call _fsEndSession() before super.dispose(); (first occurrence = _RemotePageState)
            $c = [regex]::Replace($c, [regex]::Escape("super.dispose();"), "_fsEndSession();`n    super.dispose();", 1)

            Write-Host "desktop_remote_page.dart: session tracking injected"
          }

          $c | Set-Content $f -Encoding utf8

          if ($c -eq $before) {
            Write-Host "Warning: desktop_remote_page.dart was not modified"
          }

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build RustDesk (Flutter + Rust)
        run: python .\build.py --portable --hwcodec --flutter --vram
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
          LIBCLANG_PATH: C:\llvm\bin

      # ── Collect and rename output ─────────────────────────────────────────
      - name: Collect output exe
        shell: pwsh
        run: |
          $src = $null
          $kind = ""

          $portable = Get-ChildItem "rustdesk_portable.exe" -ErrorAction SilentlyContinue
          if ($portable) {
            $src  = $portable.FullName
            $kind = "portable"
          } else {
            $installer = Get-ChildItem "rustdesk-*-install.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($installer) {
              $src  = $installer.FullName
              $kind = "installer"
            }
          }

          if ($src) {
            Copy-Item $src "Fred_Admin.exe" -Force
            $mb = [math]::Round((Get-Item "Fred_Admin.exe").Length/1MB, 1)
            Write-Host "Collected Fred_Admin.exe ($mb MB) [$kind]"
          } else {
            Write-Error "No output exe found — check build logs above"
          }

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload Fred_Admin.exe
        uses: actions/upload-artifact@v4
        with:
          name: Fred_Admin
          path: Fred_Admin.exe
          retention-days: 90
          if-no-files-found: error
