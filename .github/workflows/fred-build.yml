# fred-admin-build.yml
# Place this file in your RustDesk fork at: .github/workflows/fred-admin-build.yml
#
# Builds "Fred Admin" — the admin-side outgoing-only client with session tracking.
# Key differences from fred-build.yml (customer client):
#   - No incoming connections, no baked-in password
#   - Settings: General, Display, About (not locked down)
#   - No phone-home registration — admin is not tracked as a client
#   - Patches remote_page.dart for session start/heartbeat/end signalling
#   - Normal window size (not shrunk)
#
# Trigger: push to master, or manually via Actions → "Run workflow"
# Runner:  windows-2022 (free for public repos)
# Output:  Fred_Admin.exe  (GitHub Actions artifact, 90-day retention)

name: Build Fred Admin

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RUST_VERSION:    "1.75.0"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION:    "15.0.6"
  VCPKG_COMMIT:    "120deac3062162151622ca4860575a33844ba10b"
  PORTAL_URL:      "https://help.fredtheitguy.com"
  # ── Branding ──────────────────────────────────────────────────────────────
  APP_NAME:        "FRDP Admin"
  APP_TITLE:       "FRDP Admin"
  ADMIN_DISPLAY_NAME: "Fred IT Support"

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 150

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout fork with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── Cache: vcpkg binary cache ──────────────────────────────────────────
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-${{ env.VCPKG_COMMIT }}-x64-windows-static
          restore-keys: vcpkg-${{ env.VCPKG_COMMIT }}-

      # ── Cache: Rust registry + build cache ────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ env.RUST_VERSION }}-

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      # ── LLVM ────────────────────────────────────────────────────────────────
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}
          directory: C:\llvm

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:\llvm\bin" >> $env:GITHUB_ENV

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Install Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Flutter precache (Windows)
        run: flutter precache --windows

      # ── Custom Flutter engine (required for RustDesk) ─────────────────────
      - name: Download RustDesk custom Flutter engine
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip" `
            -OutFile "$env:TEMP\rd-engine.zip" `
            -UseBasicParsing

      - name: Install custom Flutter engine
        run: |
          $flutterRoot  = (Get-Command flutter).Source | Split-Path | Split-Path
          $engineDest   = "$flutterRoot\bin\cache\artifacts\engine\windows-x64-release"
          New-Item -ItemType Directory -Force -Path $engineDest | Out-Null
          Expand-Archive -Path "$env:TEMP\rd-engine.zip" -DestinationPath "$env:TEMP\rd-engine" -Force
          Copy-Item -Path "$env:TEMP\rd-engine\*" -Destination $engineDest -Force
          Write-Host "Custom engine installed to $engineDest"

      # ── Flutter dropdown-menu patch (3.24.4/3.24.5) ───────────────────────
      - name: Apply Flutter dropdown patch
        run: |
          $patch = ".github\patches\flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if (Test-Path $patch) {
            $flutterRoot = (Get-Command flutter).Source | Split-Path | Split-Path
            Copy-Item $patch $flutterRoot
            Push-Location $flutterRoot
            git apply "flutter_3.24.4_dropdown_menu_enableFilter.diff" 2>$null || true
            Pop-Location
            Write-Host "Flutter patch applied"
          } else {
            Write-Host "Patch file not found — skipping"
          }

      # ── vcpkg ───────────────────────────────────────────────────────────────
      - name: Setup vcpkg at pinned commit
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgDirectory: C:\vcpkg

      - name: Install vcpkg dependencies (x64-windows-static)
        run: |
          C:\vcpkg\vcpkg install `
            --triplet x64-windows-static `
            --x-install-root="C:\vcpkg\installed"
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static

      # ── Add ureq HTTP client ─────────────────────────────────────────────
      - name: Add ureq to Cargo.toml
        shell: pwsh
        run: |
          $cargo = Get-Content "Cargo.toml" -Raw
          if ($cargo -notmatch '"ureq"') {
            $cargo = $cargo -replace '(\[dependencies\])', "[dependencies]`nureq = { version = `"2`", features = [`"tls`"] }"
            $cargo | Set-Content "Cargo.toml" -Encoding utf8
            Write-Host "Added ureq to Cargo.toml"
          } else {
            Write-Host "ureq already present"
          }

      # ── Patch src/common.rs: relay server + options only ─────────────────
      # Admin client sets relay/key/options but does NOT phone-home or register
      # as a customer client. No permanent password baked in.
      - name: Patch src/common.rs (relay server + options)
        shell: pwsh
        env:
          RUSTDESK_HOST: ${{ secrets.RUSTDESK_HOST }}
          RUSTDESK_KEY:  ${{ secrets.RUSTDESK_KEY }}
        run: |
          $h      = $env:RUSTDESK_HOST
          $k      = $env:RUSTDESK_KEY
          $dn     = $env:ADMIN_DISPLAY_NAME
          $f      = "src\common.rs"
          $c      = Get-Content $f -Raw
          $before = $c

          $inject = @"

              // ── Fred Admin: compiled-in relay server ─────────────────────────────
              *hbb_common::config::EXE_RENDEZVOUS_SERVER.write().unwrap() = "$h".to_owned();
              if !"$k".is_empty() {
                  hbb_common::config::Config::set_option("key".to_owned(), "$k".to_owned());
              }
              // ── Fred Admin: allow remote config modification ──────────────────────
              hbb_common::config::Config::set_option("allow-remote-config-modification".to_owned(), "Y".to_owned());
              // ── Fred Admin: disable update check notifications ────────────────────
              hbb_common::config::Config::set_option("enable-check-update".to_owned(), "N".to_owned());
              // ── Fred Admin: force dark theme ──────────────────────────────────────
              hbb_common::config::LocalConfig::set_option("theme".to_owned(), "dark".to_owned());
              // ── Fred Admin: set initial display name shown to remote peers ──────────
              if hbb_common::config::LocalConfig::get_option("user_info").is_empty() {
                  hbb_common::config::LocalConfig::set_option("user_info".to_owned(), "{\"display_name\":\"$dn\"}".to_owned());
              }
          "@

          $target = [regex]::Match($c, 'pub fn load_custom_client\(\)[^{]*\{').Value
          if (!$target) {
            Write-Error "load_custom_client() not found in $f — function may have been renamed"
            exit 1
          }
          $c = $c.Replace($target, $target + $inject)
          $c | Set-Content $f -Encoding utf8

          if ($c -eq $before) {
            Write-Error "src/common.rs was not modified"
            exit 1
          }
          Write-Host "Patched load_custom_client() in src/common.rs"
          Write-Host "  EXE_RENDEZVOUS_SERVER = $h"
          Write-Host "  ADMIN_DISPLAY_NAME    = $dn"

      # ── Generate bridge_generated.rs ─────────────────────────────────────
      - name: Flutter pub get (required before bridge codegen)
        run: flutter pub get
        working-directory: flutter

      - name: Generate flutter_rust_bridge
        shell: pwsh
        env:
          LIBCLANG_PATH: C:\llvm\bin
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          flutter_rust_bridge_codegen `
            --rust-input src/flutter_ffi.rs `
            --dart-output flutter/lib/generated_bridge.dart
          Write-Host "bridge_generated.rs created"

      # ── Python build deps ─────────────────────────────────────────────────
      - name: Install Python build dependencies
        run: python -m pip install --quiet requests argparse

      # ── Branding ─────────────────────────────────────────────────────────
      - name: Apply branding
        shell: pwsh
        run: |
          $name   = "${{ env.APP_NAME }}"
          $title  = "${{ env.APP_TITLE }}"

          # 1. Window title (C++ runner)
          $f = "flutter\windows\runner\main.cpp"
          (Get-Content $f -Raw) -replace 'std::wstring app_name = L"RustDesk"', "std::wstring app_name = L`"$title`"" |
            Set-Content $f -Encoding utf8
          Write-Host "main.cpp: window title → $title"

          # 2. Exe metadata
          $f = "flutter\windows\runner\Runner.rc"
          $bytes = [System.IO.File]::ReadAllBytes($f)
          $enc = if ($bytes[0] -eq 0xFF -and $bytes[1] -eq 0xFE) { [System.Text.Encoding]::Unicode } else { [System.Text.Encoding]::UTF8 }
          $c = $enc.GetString($bytes)
          $c = $c -replace 'VALUE "FileDescription", "RustDesk[^"]*"', "VALUE `"FileDescription`", `"$name`""
          $c = $c -replace 'VALUE "ProductName", "RustDesk[^"]*"',     "VALUE `"ProductName`", `"$name`""
          [System.IO.File]::WriteAllText($f, $c, $enc)
          Write-Host "Runner.rc: product name → $name"

          # 3. Hide update notification card + replace right panel with admin notes panel
          $f = "flutter\lib\desktop\pages\desktop_home_page.dart"
          $c = Get-Content $f -Raw
          $c = $c -replace 'bind\.mainGetNewVersion\(\)\.isNotEmpty', 'false'

          $panel = @(
            'Expanded(',
            '              child: Container(',
            '                decoration: BoxDecoration(',
            '                  color: Color(0xFF242424),',
            '                  border: Border(left: BorderSide(color: Color(0xFF2D2D2D))),',
            '                ),',
            '                padding: EdgeInsets.all(20),',
            '                child: Column(',
            '                  crossAxisAlignment: CrossAxisAlignment.start,',
            '                  children: [',
            '                    Row(children: [',
            '                      Icon(Icons.admin_panel_settings_outlined, color: Color(0xFF6366F1), size: 18),',
            '                      SizedBox(width: 8),',
            "                      Text('FRDP Admin', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 14, color: Color(0xFFF1F5F9))),",
            '                    ]),',
            '                    SizedBox(height: 8),',
            "                    _FsAliasWidget(),",
            '                    SizedBox(height: 16),',
            "                    Text('Quick Connect', style: TextStyle(fontSize: 12, fontWeight: FontWeight.w600, color: Color(0xFF94A3B8))),",
            '                    SizedBox(height: 8),',
            '                    _FsQuickConnectWidget(),',
            '                    SizedBox(height: 16),',
            '                    Divider(color: Color(0xFF2D2D2D)),',
            '                    SizedBox(height: 12),',
            "                    Text('Scratch Pad', style: TextStyle(fontSize: 12, fontWeight: FontWeight.w600, color: Color(0xFF94A3B8))),",
            '                    SizedBox(height: 8),',
            '                    Expanded(',
            '                      child: TextField(',
            '                        maxLines: null,',
            '                        expands: true,',
            '                        textAlignVertical: TextAlignVertical.top,',
            '                        style: TextStyle(fontSize: 12, color: Color(0xFFF1F5F9)),',
            '                        decoration: InputDecoration(',
            "                          hintText: 'General notes...',",
            '                          hintStyle: TextStyle(color: Color(0xFF475569), fontSize: 12),',
            '                          filled: true,',
            '                          fillColor: Color(0xFF1A1A2E),',
            '                          border: OutlineInputBorder(',
            '                            borderRadius: BorderRadius.circular(6),',
            '                            borderSide: BorderSide(color: Color(0xFF2D2D2D)),',
            '                          ),',
            '                          enabledBorder: OutlineInputBorder(',
            '                            borderRadius: BorderRadius.circular(6),',
            '                            borderSide: BorderSide(color: Color(0xFF2D2D2D)),',
            '                          ),',
            '                          focusedBorder: OutlineInputBorder(',
            '                            borderRadius: BorderRadius.circular(6),',
            '                            borderSide: BorderSide(color: Color(0xFF6366F1)),',
            '                          ),',
            '                          contentPadding: EdgeInsets.all(10),',
            '                        ),',
            '                      ),',
            '                    ),',
            '                  ],',
            '                ),',
            '              ),',
            '            )'
          ) -join "`n"

          $quickConnectClass = @(
            '',
            'class _FsQuickConnectWidget extends StatefulWidget {',
            '  const _FsQuickConnectWidget({Key? key}) : super(key: key);',
            '  @override',
            '  State<_FsQuickConnectWidget> createState() => _FsQuickConnectWidgetState();',
            '}',
            'class _FsQuickConnectWidgetState extends State<_FsQuickConnectWidget> {',
            '  final TextEditingController _ctrl = TextEditingController();',
            '  @override',
            '  void dispose() { _ctrl.dispose(); super.dispose(); }',
            '  @override',
            '  Widget build(BuildContext context) {',
            '    return Row(children: [',
            '      Expanded(child: TextField(',
            '        controller: _ctrl,',
            '        onSubmitted: (v) {',
            "          final id = v.trim().replaceAll(' ', '');",
            '          if (id.isNotEmpty) { connect(context, id); _ctrl.clear(); }',
            '        },',
            '        style: const TextStyle(fontSize: 12, color: Color(0xFFF1F5F9)),',
            '        decoration: InputDecoration(',
            "          hintText: 'Peer ID...',",
            '          hintStyle: const TextStyle(color: Color(0xFF475569), fontSize: 12),',
            '          filled: true,',
            '          fillColor: const Color(0xFF1A1A2E),',
            '          isDense: true,',
            '          contentPadding: const EdgeInsets.symmetric(horizontal: 10, vertical: 8),',
            '          border: OutlineInputBorder(borderRadius: BorderRadius.circular(6), borderSide: const BorderSide(color: Color(0xFF2D2D2D))),',
            '          enabledBorder: OutlineInputBorder(borderRadius: BorderRadius.circular(6), borderSide: const BorderSide(color: Color(0xFF2D2D2D))),',
            '          focusedBorder: OutlineInputBorder(borderRadius: BorderRadius.circular(6), borderSide: const BorderSide(color: Color(0xFF6366F1))),',
            '        ),',
            '      )),',
            '      const SizedBox(width: 8),',
            '      ElevatedButton(',
            '        onPressed: () {',
            "          final id = _ctrl.text.trim().replaceAll(' ', '');",
            '          if (id.isNotEmpty) { connect(context, id); _ctrl.clear(); }',
            '        },',
            '        style: ElevatedButton.styleFrom(',
            '          backgroundColor: const Color(0xFF6366F1),',
            '          foregroundColor: Colors.white,',
            '          padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 8),',
            '          minimumSize: Size.zero,',
            '          tapTargetSize: MaterialTapTargetSize.shrinkWrap,',
            '          shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(6)),',
            '          textStyle: const TextStyle(fontSize: 12),',
            '        ),',
            "        child: const Text('Connect'),",
            '      ),',
            '    ]);',
            '  }',
            '}',
            '',
            'class _FsAliasWidget extends StatefulWidget {',
            '  const _FsAliasWidget({Key? key}) : super(key: key);',
            '  @override',
            '  State<_FsAliasWidget> createState() => _FsAliasWidgetState();',
            '}',
            'class _FsAliasWidgetState extends State<_FsAliasWidget> {',
            '  final TextEditingController _ctrl = TextEditingController();',
            '  @override',
            '  void initState() {',
            '    super.initState();',
            '    _loadAlias();',
            '  }',
            '  void _loadAlias() async {',
            "    final raw = await bind.mainGetLocalOption(key: 'user_info');",
            "    String name = '';",
            "    final start = raw.indexOf('`"display_name`":`"');",
            "    if (start != -1) {",
            '      final s = start + 16;',
            "      final end = raw.indexOf('`"', s);",
            '      if (end != -1) name = raw.substring(s, end);',
            '    }',
            '    if (mounted) setState(() { _ctrl.text = name; });',
            '  }',
            '  @override',
            '  void dispose() { _ctrl.dispose(); super.dispose(); }',
            '  void _save() {',
            "    final n = _ctrl.text.trim();",
            "    bind.mainSetLocalOption(key: 'user_info', value: '{`"display_name`":`"' + n + '`"}');",
            '  }',
            '  @override',
            '  Widget build(BuildContext context) {',
            '    return Row(children: [',
            '      Expanded(child: TextField(',
            '        controller: _ctrl,',
            '        onSubmitted: (_) => _save(),',
            '        style: const TextStyle(fontSize: 12, color: Color(0xFFF1F5F9)),',
            '        decoration: InputDecoration(',
            "          hintText: 'Display name...',",
            '          hintStyle: const TextStyle(color: Color(0xFF475569), fontSize: 12),',
            '          filled: true,',
            '          fillColor: const Color(0xFF1A1A2E),',
            '          isDense: true,',
            '          contentPadding: const EdgeInsets.symmetric(horizontal: 10, vertical: 8),',
            '          border: OutlineInputBorder(borderRadius: BorderRadius.circular(6), borderSide: const BorderSide(color: Color(0xFF2D2D2D))),',
            '          enabledBorder: OutlineInputBorder(borderRadius: BorderRadius.circular(6), borderSide: const BorderSide(color: Color(0xFF2D2D2D))),',
            '          focusedBorder: OutlineInputBorder(borderRadius: BorderRadius.circular(6), borderSide: const BorderSide(color: Color(0xFF6366F1))),',
            '        ),',
            '      )),',
            '      const SizedBox(width: 6),',
            '      IconButton(',
            '        onPressed: _save,',
            '        icon: const Icon(Icons.check, size: 18, color: Color(0xFF6366F1)),',
            '        padding: EdgeInsets.zero,',
            '        constraints: const BoxConstraints(minWidth: 28, minHeight: 28),',
            '        splashRadius: 16,',
            '      ),',
            '    ]);',
            '  }',
            '}'
          ) -join "`n"

          $c = $c.Replace('if (!isIncomingOnly) Expanded(child: buildRightPane(context))', $panel)
          $c = $c + $quickConnectClass
          $c | Set-Content $f -Encoding utf8
          Write-Host "desktop_home_page.dart: update card hidden + admin panel with quick connect injected"

          # 4. Icon — admin clients share the same branding assets
          if (Test-Path "assets\app_icon.ico") {
            Copy-Item "assets\app_icon.ico" "flutter\windows\runner\resources\app_icon.ico" -Force
            Copy-Item "assets\app_icon.ico" "res\icon.ico" -Force
            Write-Host "Icon: replaced"
          }
          if (Test-Path "assets\polished_logo.svg") {
            Copy-Item "assets\polished_logo.svg" "flutter\assets\icon.svg" -Force
            Write-Host "SVG icon: replaced"
          }

      # ── Admin settings tabs: General, Display, About ──────────────────────
      # Customer client locks down to General + About only.
      # Admin needs Display settings (codec, resolution, DPI) for remote work.
      - name: Configure settings tabs (General, Display, About)
        shell: pwsh
        run: |
          $f = "flutter\lib\desktop\pages\desktop_setting_page.dart"
          $c = Get-Content $f -Raw
          $before = $c
          $startMark = 'static final List<SettingsTabKey> tabKeys = ['
          $startIdx  = $c.IndexOf($startMark)
          if ($startIdx -ge 0) {
            $endIdx = $c.IndexOf('];', $startIdx)
            if ($endIdx -ge 0) {
              $newList = $startMark + "`n    SettingsTabKey.general,`n    SettingsTabKey.display,`n    SettingsTabKey.about,`n  ];"
              $c = $c.Substring(0, $startIdx) + $newList + $c.Substring($endIdx + 2)
            }
          }
          $c | Set-Content $f -Encoding utf8
          if ($c -eq $before) {
            Write-Host "Warning: tabKeys pattern not matched — tabs unchanged"
          } else {
            Write-Host "desktop_setting_page.dart: settings tabs → General, Display, About"
          }

      # ── Patch remote_page.dart: session tracking + draggable notes overlay ──────
      # Injects:
      #   1. _FsNotesOverlayWidget — draggable icon/panel (floating, no screen resize)
      #      Collapsed: small indigo notepad icon, draggable to any position
      #      Expanded:  notes panel with header (tap header to collapse), draggable
      #   2. Session start/heartbeat/end into _RemotePageState
      - name: Patch remote_page.dart (session tracking)
        shell: pwsh
        run: |
          $portal = "${{ env.PORTAL_URL }}"
          $f = "flutter\lib\desktop\pages\remote_page.dart"
          if (!(Test-Path $f)) {
            Write-Host "remote_page.dart not found at expected path — searching..."
            Get-ChildItem -Recurse -Filter "*remote_page*" flutter\lib | Select-Object FullName
            Write-Error "Cannot find remote_page.dart — update path in workflow"
            exit 1
          }
          $c = Get-Content $f -Raw
          $before = $c

          # Add required imports if not already present
          if ($c -notmatch "import 'dart:convert'") {
            $c = "import 'dart:convert';`n" + $c
          }
          if ($c -notmatch "import 'dart:async'") {
            $c = "import 'dart:async';`n" + $c
          }
          if ($c -notmatch "package:http/http.dart") {
            $c = "import 'package:http/http.dart' as rdHttp;`n" + $c
          }

          $classStart = $c.IndexOf('class _RemotePageState extends State<RemotePage>')
          if ($classStart -lt 0) {
            Write-Host "Warning: _RemotePageState not found — session tracking not injected"
          } else {
            # ── 1. Inject draggable overlay StatefulWidget before _RemotePageState ────
            # Array-join: single-quoted PS strings for Dart code (no PS interpolation).
            # Lines with Dart single-quoted strings use double-quoted PS strings.
            $helperClass = @(
              '// ── Fred Admin: draggable overlay widget (reused for scratch pad + session log) ──',
              'class _FsOverlayWidget extends StatefulWidget {',
              '  final TextEditingController controller;',
              '  final String title;',
              '  final IconData icon;',
              '  final Color accentColor;',
              '  final double initOffsetBottom;',
              '  const _FsOverlayWidget({required this.controller, required this.title, required this.icon, this.accentColor = const Color(0xFF6366F1), this.initOffsetBottom = 60});',
              '  @override',
              '  State<_FsOverlayWidget> createState() => _FsOverlayWidgetState();',
              '}',
              '',
              'class _FsOverlayWidgetState extends State<_FsOverlayWidget> {',
              '  double _x = 0;',
              '  double _y = 0;',
              '  bool _expanded = false;',
              '  bool _placed = false;',
              '',
              '  @override',
              '  void initState() {',
              '    super.initState();',
              '    WidgetsBinding.instance.addPostFrameCallback((_) {',
              '      if (!mounted) return;',
              '      final sz = MediaQuery.of(context).size;',
              '      setState(() {',
              '        _x = sz.width - 60;',
              '        _y = sz.height - widget.initOffsetBottom;',
              '        _placed = true;',
              '      });',
              '    });',
              '  }',
              '',
              '  @override',
              '  Widget build(BuildContext context) {',
              '    if (!_placed) return const SizedBox.shrink();',
              '    return Positioned(',
              '      left: _x,',
              '      top: _y,',
              '      child: GestureDetector(',
              '        onPanUpdate: (d) => setState(() {',
              '          _x += d.delta.dx;',
              '          _y += d.delta.dy;',
              '        }),',
              '        child: Material(',
              '          color: Colors.transparent,',
              '          child: _expanded ? _buildPanel() : _buildIcon(),',
              '        ),',
              '      ),',
              '    );',
              '  }',
              '',
              '  Widget _buildIcon() {',
              '    return GestureDetector(',
              "      onTap: () => setState(() { _expanded = true; }),",
              '      child: Container(',
              '        width: 44,',
              '        height: 44,',
              '        decoration: BoxDecoration(',
              '          color: widget.accentColor,',
              '          borderRadius: BorderRadius.circular(22),',
              '          boxShadow: [BoxShadow(color: Colors.black54, blurRadius: 6, offset: Offset(0, 2))],',
              '        ),',
              '        child: Icon(widget.icon, color: Colors.white, size: 22),',
              '      ),',
              '    );',
              '  }',
              '',
              '  Widget _buildPanel() {',
              '    return Container(',
              '      width: 260,',
              '      decoration: BoxDecoration(',
              '        color: Color(0xFF1E1E2E),',
              '        borderRadius: BorderRadius.circular(8),',
              '        border: Border.all(color: Color(0xFF2D2D2D)),',
              '        boxShadow: [BoxShadow(color: Colors.black54, blurRadius: 8, offset: Offset(0, 2))],',
              '      ),',
              '      child: Column(',
              '        mainAxisSize: MainAxisSize.min,',
              '        children: [',
              '          GestureDetector(',
              "            onTap: () => setState(() { _expanded = false; }),",
              '            child: Container(',
              '              padding: EdgeInsets.symmetric(horizontal: 10, vertical: 8),',
              '              decoration: BoxDecoration(',
              '                color: Color(0xFF2D2D3E),',
              '                borderRadius: BorderRadius.only(',
              '                  topLeft: Radius.circular(8),',
              '                  topRight: Radius.circular(8),',
              '                ),',
              '              ),',
              '              child: Row(',
              '                children: [',
              '                  Icon(widget.icon, color: widget.accentColor, size: 16),',
              '                  SizedBox(width: 6),',
              '                  Expanded(',
              '                    child: Text(',
              '                      widget.title,',
              '                      style: TextStyle(fontSize: 10, color: Color(0xFF94A3B8)),',
              '                      overflow: TextOverflow.ellipsis,',
              '                    ),',
              '                  ),',
              '                  Icon(Icons.expand_more, color: Color(0xFF64748B), size: 16),',
              '                ],',
              '              ),',
              '            ),',
              '          ),',
              '          Padding(',
              '            padding: EdgeInsets.all(10),',
              '            child: SizedBox(',
              '              height: 120,',
              '              child: TextField(',
              '                controller: widget.controller,',
              '                maxLines: null,',
              '                expands: true,',
              '                textAlignVertical: TextAlignVertical.top,',
              '                style: TextStyle(fontSize: 12, color: Color(0xFFF1F5F9)),',
              '                decoration: InputDecoration(',
              "                  hintText: 'Notes...',",
              '                  hintStyle: TextStyle(color: Color(0xFF475569), fontSize: 12),',
              '                  filled: true,',
              '                  fillColor: Color(0xFF0F0F1A),',
              '                  border: OutlineInputBorder(',
              '                    borderRadius: BorderRadius.circular(4),',
              '                    borderSide: BorderSide(color: Color(0xFF2D2D2D)),',
              '                  ),',
              '                  enabledBorder: OutlineInputBorder(',
              '                    borderRadius: BorderRadius.circular(4),',
              '                    borderSide: BorderSide(color: Color(0xFF2D2D2D)),',
              '                  ),',
              '                  focusedBorder: OutlineInputBorder(',
              '                    borderRadius: BorderRadius.circular(4),',
              '                    borderSide: BorderSide(color: widget.accentColor),',
              '                  ),',
              '                  contentPadding: EdgeInsets.all(8),',
              '                ),',
              '              ),',
              '            ),',
              '          ),',
              '        ],',
              '      ),',
              '    );',
              '  }',
              '}',
              ''
            ) -join "`n"

            # Find opening brace of _RemotePageState before inserting helper class.
            # If we inserted the helper first, super.initState() regex would hit _FsNotesOverlayWidgetState instead.
            $openBrace = $c.IndexOf('{', $classStart)

            # ── 2. Inject session fields + methods into _RemotePageState ──────────────
            $dartInject = @(
              '',
              '  // ── Fred Admin: session tracking ───────────────────────────────────────────',
              '  String? _fsSessionId;',
              '  Timer? _fsHeartbeatTimer;',
              '  OverlayEntry? _fsScratchOverlay;',
              '  OverlayEntry? _fsSessionLogOverlay;',
              '  final TextEditingController _fsScratchController = TextEditingController();',
              '  final TextEditingController _fsSessionLogController = TextEditingController();',
              '',
              '  void _fsShowOverlays() {',
              '    _fsScratchOverlay?.remove();',
              '    _fsSessionLogOverlay?.remove();',
              '    final now = DateTime.now();',
              "    final mo = now.month.toString().padLeft(2, '0');",
              "    final dy = now.day.toString().padLeft(2, '0');",
              "    final hr = now.hour.toString().padLeft(2, '0');",
              "    final mn = now.minute.toString().padLeft(2, '0');",
              "    final timeStr = mo + '/' + dy + '/' + now.year.toString() + ' ' + hr + ':' + mn;",
              '    _fsScratchOverlay = OverlayEntry(',
              '      builder: (ctx) => _FsOverlayWidget(',
              '        controller: _fsScratchController,',
              "        title: 'Scratch \u00b7 ' + widget.id,",
              '        icon: Icons.sticky_note_2,',
              '        accentColor: Color(0xFF6366F1),',
              '        initOffsetBottom: 60,',
              '      ),',
              '    );',
              '    _fsSessionLogOverlay = OverlayEntry(',
              '      builder: (ctx) => _FsOverlayWidget(',
              '        controller: _fsSessionLogController,',
              "        title: 'Log \u00b7 ' + widget.id + '  ' + timeStr,",
              '        icon: Icons.work_outline,',
              '        accentColor: Color(0xFFF59E0B),',
              '        initOffsetBottom: 120,',
              '      ),',
              '    );',
              '    WidgetsBinding.instance.addPostFrameCallback((_) {',
              '      if (mounted) {',
              '        try {',
              '          final ov = Overlay.of(context);',
              '          ov.insert(_fsScratchOverlay!);',
              '          ov.insert(_fsSessionLogOverlay!);',
              "        } catch (_) {}",
              '      }',
              '    });',
              '  }',
              '',
              '  void _fsStartSession() async {',
              '    await Future.delayed(const Duration(seconds: 2));',
              '    try {',
              "      final resp = await rdHttp.post(",
              "        Uri.parse('$portal/api/session/start'),",
              "        headers: {'Content-Type': 'application/json'},",
              "        body: jsonEncode({'peer_id': widget.id}),",
              '      );',
              '      if (resp.statusCode == 200) {',
              '        final data = jsonDecode(resp.body) as Map<String, dynamic>;',
              "        _fsSessionId = data['session_id'].toString();",
              '        _fsHeartbeatTimer = Timer.periodic(',
              '          const Duration(seconds: 30),',
              '          (_) => _fsSendHeartbeat(),',
              '        );',
              '        _fsShowOverlays();',
              '      }',
              '    } catch (_) {}',
              '  }',
              '',
              '  void _fsSendHeartbeat() async {',
              '    final sid = _fsSessionId;',
              '    if (sid == null) return;',
              '    try {',
              "      await rdHttp.post(",
              "        Uri.parse('$portal/api/session/heartbeat'),",
              "        headers: {'Content-Type': 'application/json'},",
              "        body: jsonEncode({'session_id': int.parse(sid)}),",
              '      );',
              '    } catch (_) {}',
              '  }',
              '',
              '  void _fsEndSession() {',
              '    _fsHeartbeatTimer?.cancel();',
              '    _fsHeartbeatTimer = null;',
              '    _fsScratchOverlay?.remove();',
              '    _fsScratchOverlay = null;',
              '    _fsSessionLogOverlay?.remove();',
              '    _fsSessionLogOverlay = null;',
              '    final sid = _fsSessionId;',
              '    if (sid == null) return;',
              '    _fsSessionId = null;',
              "    final notes = _fsSessionLogController.text.trim().isEmpty ? null : _fsSessionLogController.text.trim();",
              "    rdHttp.post(",
              "      Uri.parse('$portal/api/session/end'),",
              "      headers: {'Content-Type': 'application/json'},",
              "      body: jsonEncode({'session_id': int.parse(sid), 'notes': notes}),",
              '    );',
              '  }',
              '  // ── end Fred Admin session tracking ──────────────────────────────────────────',
              ''
            ) -join "`n"

            $c = $c.Substring(0, $openBrace + 1) + $dartInject + $c.Substring($openBrace + 1)

            # Patch super.initState/dispose now — helper class not yet injected,
            # so the first occurrences are unambiguously in _RemotePageState.
            $c = [regex]::Replace($c, [regex]::Escape("super.initState();"), "super.initState();`n    _fsStartSession();", 1)
            $c = [regex]::Replace($c, [regex]::Escape("super.dispose();"), "_fsEndSession();`n    _fsScratchController.dispose();`n    _fsSessionLogController.dispose();`n    super.dispose();", 1)

            # ── 3. LAST: inject helper class before _RemotePageState ──────────────────
            # Re-find position after dartInject shifted the file contents.
            $classStart = $c.IndexOf('class _RemotePageState extends State<RemotePage>')
            $c = $c.Substring(0, $classStart) + $helperClass + "`n" + $c.Substring($classStart)

            Write-Host "remote_page.dart: scratch pad + session log overlays injected"
          }

          $c | Set-Content $f -Encoding utf8

          if ($c -eq $before) {
            Write-Host "Warning: remote_page.dart was not modified"
          }

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build RustDesk (Flutter + Rust)
        run: python .\build.py --portable --hwcodec --flutter --vram
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
          LIBCLANG_PATH: C:\llvm\bin

      # ── Collect and rename output ─────────────────────────────────────────
      - name: Collect output exe
        shell: pwsh
        run: |
          $src = $null
          $kind = ""

          $portable = Get-ChildItem "rustdesk_portable.exe" -ErrorAction SilentlyContinue
          if ($portable) {
            $src  = $portable.FullName
            $kind = "portable"
          } else {
            $installer = Get-ChildItem "rustdesk-*-install.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($installer) {
              $src  = $installer.FullName
              $kind = "installer"
            }
          }

          if ($src) {
            Copy-Item $src "Fred_Admin.exe" -Force
            $mb = [math]::Round((Get-Item "Fred_Admin.exe").Length/1MB, 1)
            Write-Host "Collected Fred_Admin.exe ($mb MB) [$kind]"
          } else {
            Write-Error "No output exe found — check build logs above"
          }

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload Fred_Admin.exe
        uses: actions/upload-artifact@v4
        with:
          name: Fred_Admin
          path: Fred_Admin.exe
          retention-days: 90
          if-no-files-found: error
