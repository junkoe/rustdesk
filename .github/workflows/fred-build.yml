# fred-build.yml
# Place this file in your RustDesk fork at: .github/workflows/fred-build.yml
#
# Builds "Fred the IT Guy" — a custom RustDesk client that phones home with
# its peer ID on first launch.
#
# Trigger: push to master, or manually via Actions → "Run workflow"
# Runner:  windows-2022 (free for public repos)
# Output:  Fred_the_IT_Guy.exe  (GitHub Actions artifact, 90-day retention)

name: Build Fred the IT Guy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RUST_VERSION:    "1.75.0"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION:    "15.0.6"
  VCPKG_COMMIT:    "120deac3062162151622ca4860575a33844ba10b"
  PORTAL_URL:      "https://help.fredtheitguy.com"
  # ── Branding (change these to rebrand for another deployment) ──────────────
  APP_NAME:        "Fred the IT Guy"   # exe metadata / about screen
  APP_TITLE:       "Fred IT Support"   # window title bar
  SUPPORT_PHONE:   "(602) 695-9825"              # shown in the info panel
  WEBSITE_URL:     "https://help.fredtheitguy.com" # banner click destination
  BANNER_LABEL:    "Support Site"                   # banner main text
  BANNER_URL_TEXT: "help.fredtheitguy.com"          # banner displayed URL
  # Optional icon: commit a file to clients/rustdesk-build/app_icon.ico and it
  # will automatically replace the default RustDesk icon in the build.

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 150

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout fork with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── Cache: vcpkg binary cache ──────────────────────────────────────────────
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-${{ env.VCPKG_COMMIT }}-x64-windows-static
          restore-keys: vcpkg-${{ env.VCPKG_COMMIT }}-

      # ── Cache: Rust registry + build cache ────────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ env.RUST_VERSION }}-

      # ── Rust ──────────────────────────────────────────────────────────────────
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      # ── LLVM ──────────────────────────────────────────────────────────────────
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}
          directory: C:\llvm

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:\llvm\bin" >> $env:GITHUB_ENV

      # ── Flutter ───────────────────────────────────────────────────────────────
      - name: Install Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Flutter precache (Windows)
        run: flutter precache --windows

      # ── Custom Flutter engine (required for RustDesk) ─────────────────────────
      - name: Download RustDesk custom Flutter engine
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip" `
            -OutFile "$env:TEMP\rd-engine.zip" `
            -UseBasicParsing

      - name: Install custom Flutter engine
        run: |
          $flutterRoot  = (Get-Command flutter).Source | Split-Path | Split-Path
          $engineDest   = "$flutterRoot\bin\cache\artifacts\engine\windows-x64-release"
          New-Item -ItemType Directory -Force -Path $engineDest | Out-Null
          Expand-Archive -Path "$env:TEMP\rd-engine.zip" -DestinationPath "$env:TEMP\rd-engine" -Force
          Copy-Item -Path "$env:TEMP\rd-engine\*" -Destination $engineDest -Force
          Write-Host "Custom engine installed to $engineDest"

      # ── Flutter dropdown-menu patch (3.24.4/3.24.5) ───────────────────────────
      - name: Apply Flutter dropdown patch
        run: |
          $patch = ".github\patches\flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if (Test-Path $patch) {
            $flutterRoot = (Get-Command flutter).Source | Split-Path | Split-Path
            Copy-Item $patch $flutterRoot
            Push-Location $flutterRoot
            git apply "flutter_3.24.4_dropdown_menu_enableFilter.diff" 2>$null || true
            Pop-Location
            Write-Host "Flutter patch applied"
          } else {
            Write-Host "Patch file not found — skipping"
          }

      # ── vcpkg ─────────────────────────────────────────────────────────────────
      - name: Setup vcpkg at pinned commit
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgDirectory: C:\vcpkg

      - name: Install vcpkg dependencies (x64-windows-static)
        run: |
          C:\vcpkg\vcpkg install `
            --triplet x64-windows-static `
            --x-install-root="C:\vcpkg\installed"
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static

      # ── Add ureq HTTP client (used for phone-home registration) ─────────────────
      - name: Add ureq to Cargo.toml
        shell: pwsh
        run: |
          $cargo = Get-Content "Cargo.toml" -Raw
          if ($cargo -notmatch '"ureq"') {
            $cargo = $cargo -replace '(\[dependencies\])', "[dependencies]`nureq = { version = `"2`", features = [`"tls`"] }"
            $cargo | Set-Content "Cargo.toml" -Encoding utf8
            Write-Host "Added ureq to Cargo.toml"
          } else {
            Write-Host "ureq already present"
          }

      # ── Patch src/common.rs: relay server + phone-home ────────────────────────
      # WHY common.rs and not main.rs:
      #   Flutter builds compile src/ into librustdesk.dll (library crate).
      #   src/main.rs is a dead binary stub — fn main() never runs in a Flutter build.
      #   The real Flutter startup path is: C++ WinMain → Dart → initialize() in
      #   flutter_ffi.rs → load_custom_client() in common.rs.  Injecting here is the
      #   only place that is guaranteed to execute.
      - name: Patch src/common.rs (relay server + phone-home registration)
        shell: pwsh
        env:
          RUSTDESK_HOST: ${{ secrets.RUSTDESK_HOST }}
          RUSTDESK_KEY:  ${{ secrets.RUSTDESK_KEY }}
          RDP_PASSWORD:  ${{ secrets.RDP_PASSWORD }}
        run: |
          $h      = $env:RUSTDESK_HOST
          $k      = $env:RUSTDESK_KEY
          $p      = $env:RDP_PASSWORD
          $portal = "${{ env.PORTAL_URL }}"
          $f      = "src\common.rs"
          $c      = Get-Content $f -Raw
          $before = $c

          # Rust block injected as the first lines of load_custom_client().
          # PowerShell expands $h, $k, $portal at workflow runtime; everything
          # else is literal Rust source.
          $inject = @"

              // ── Fred IT Guy: compiled-in relay server ────────────────────────────
              // EXE_RENDEZVOUS_SERVER is priority #1 in get_rendezvous_servers() —
              // it overrides custom-rendezvous-server, cloud push, and all fallbacks.
              *hbb_common::config::EXE_RENDEZVOUS_SERVER.write().unwrap() = "$h".to_owned();
              if !"$k".is_empty() {
                  hbb_common::config::Config::set_option("key".to_owned(), "$k".to_owned());
              }
              // ── Fred IT Guy: remote admin can push config changes when connected ──
              hbb_common::config::Config::set_option("allow-remote-config-modification".to_owned(), "Y".to_owned());
              // ── Fred IT Guy: disable update check notifications ───────────────
              hbb_common::config::Config::set_option("enable-check-update".to_owned(), "N".to_owned());
              // ── Fred IT Guy: force dark theme ─────────────────────────────────
              hbb_common::config::LocalConfig::set_option("theme".to_owned(), "dark".to_owned());
              // ── Fred IT Guy: permanent password + both-mode verification ──────────
              // Allows admin to connect with RDP_PASSWORD without end-user clicking Accept.
              // End user can still accept one-time sessions via the prompt.
              if !"$p".is_empty() {
                  hbb_common::config::Config::set_permanent_password("$p");
                  hbb_common::config::Config::set_option("verification-method".to_owned(), "use-both-passwords".to_owned());
              }
              // ── Fred IT Guy: phone-home registration ─────────────────────────────
              // Spawns a background thread; waits 10 s for the peer ID to appear
              // (requires hbbs to be reachable), then POSTs to the portal once.
              std::thread::spawn(|| {
                  std::thread::sleep(std::time::Duration::from_secs(10));
                  let id = hbb_common::config::Config::get_id();
                  if id.is_empty() { return; }
                  let machine = std::env::var("COMPUTERNAME").unwrap_or_else(|_| "Unknown".to_owned());
                  let id_c   = id.replace('"', "");
                  let name_c = machine.replace('"', "").replace('\\', "");
                  let body   = format!(
                      r#"{{"client_id":"{}","machine_name":"{}","code":""}}"#,
                      id_c, name_c
                  );
                  // Initial registration (retry up to 3 times)
                  for attempt in 0..3u8 {
                      if let Ok(resp) = ureq::post(&format!("{}/api/register", "$portal"))
                          .set("Content-Type", "application/json")
                          .timeout(std::time::Duration::from_secs(10))
                          .send_string(&body) {
                          if resp.status() < 400 { break; }
                      }
                      if attempt < 2 { std::thread::sleep(std::time::Duration::from_secs(60)); }
                  }
                  // Heartbeat loop — keeps client status 'online' in the portal
                  // and handles server-pushed password rotations.
                  let hb_body = format!(r#"{{"client_id":"{}"}}"#, id_c);
                  loop {
                      std::thread::sleep(std::time::Duration::from_secs(60));
                      if let Ok(resp) = ureq::post(&format!("{}/api/heartbeat", "$portal"))
                          .set("Content-Type", "application/json")
                          .timeout(std::time::Duration::from_secs(10))
                          .send_string(&hb_body)
                      {
                          if let Ok(hb_resp) = resp.into_string() {
                              // Extract new_password field without serde_json dependency.
                              // Format is always: {"success":true,"message":"OK","new_password":"..."}
                              // Password charset never contains '"' or '\' so simple find is safe.
                              let needle = "\"new_password\":\"";
                              if let Some(start) = hb_resp.find(needle) {
                                  let after = &hb_resp[start + needle.len()..];
                                  if let Some(end) = after.find('"') {
                                      let pw = &after[..end];
                                      if !pw.is_empty() {
                                          // Try IPC path first — required when installed as a Windows
                                          // service (service process owns the in-memory password; writing
                                          // config directly only updates disk and the service never reloads).
                                          // Falls back to direct write in portable mode where no service
                                          // socket exists.
                                          if crate::ipc::set_permanent_password(pw.to_owned()).is_err() {
                                              hbb_common::config::Config::set_permanent_password(pw);
                                          }
                                          let confirm = format!(r#"{{"client_id":"{}"}}"#, id_c);
                                          let _ = ureq::post(&format!("{}/api/device/password-applied", "$portal"))
                                              .set("Content-Type", "application/json")
                                              .timeout(std::time::Duration::from_secs(10))
                                              .send_string(&confirm);
                                      }
                                  }
                              }
                          }
                      }
                  }
              });
          "@

          # Use String.Replace() rather than -replace regex to avoid
          # backreference escaping issues with the multi-line $inject.
          $target = [regex]::Match($c, 'pub fn load_custom_client\(\)[^{]*\{').Value
          if (!$target) {
            Write-Error "load_custom_client() not found in $f — function may have been renamed"
            Select-String -Path $f -Pattern "load_custom_client" | Select-Object -First 5 | % { Write-Host $_.Line }
            exit 1
          }
          $c = $c.Replace($target, $target + $inject)
          $c | Set-Content $f -Encoding utf8

          if ($c -eq $before) {
            Write-Error "src/common.rs was not modified — String.Replace() found no match"
            exit 1
          }
          Write-Host "Patched load_custom_client() in src/common.rs"
          Write-Host "  EXE_RENDEZVOUS_SERVER = $h"
          Write-Host "  Portal = $portal"

      # ── Generate bridge_generated.rs (required, missing from fork) ────────────
      - name: Flutter pub get (required before bridge codegen)
        run: flutter pub get
        working-directory: flutter

      - name: Generate flutter_rust_bridge
        shell: pwsh
        env:
          LIBCLANG_PATH: C:\llvm\bin
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          flutter_rust_bridge_codegen `
            --rust-input src/flutter_ffi.rs `
            --dart-output flutter/lib/generated_bridge.dart
          Write-Host "bridge_generated.rs created"

      # ── Python build deps ─────────────────────────────────────────────────────
      - name: Install Python build dependencies
        run: python -m pip install --quiet requests argparse

      # ── Branding ──────────────────────────────────────────────────────────────
      # All values driven from env: block at the top — change those to rebrand.
      - name: Apply branding
        shell: pwsh
        run: |
          $name   = "${{ env.APP_NAME }}"
          $title  = "${{ env.APP_TITLE }}"
          $portal = "${{ env.PORTAL_URL }}"

          # 1. Window title (C++ runner)
          $f = "flutter\windows\runner\main.cpp"
          (Get-Content $f -Raw) -replace 'std::wstring app_name = L"RustDesk"', "std::wstring app_name = L`"$title`"" |
            Set-Content $f -Encoding utf8
          Write-Host "main.cpp: window title → $title"

          # 2. Exe metadata (right-click → Properties)
          $f = "flutter\windows\runner\Runner.rc"
          $bytes = [System.IO.File]::ReadAllBytes($f)
          $enc = if ($bytes[0] -eq 0xFF -and $bytes[1] -eq 0xFE) { [System.Text.Encoding]::Unicode } else { [System.Text.Encoding]::UTF8 }
          $c = $enc.GetString($bytes)
          $c = $c -replace 'VALUE "FileDescription", "RustDesk[^"]*"', "VALUE `"FileDescription`", `"$name`""
          $c = $c -replace 'VALUE "ProductName", "RustDesk[^"]*"',     "VALUE `"ProductName`", `"$name`""
          [System.IO.File]::WriteAllText($f, $c, $enc)
          Write-Host "Runner.rc: product name → $name (encoding: $($enc.EncodingName))"

          # 3. Clear the promo tip text (widget becomes invisible)
          $f = "src\lang\en.rs"
          (Get-Content $f -Raw) -replace '("setup_server_tip",\s*)"[^"]*"', '${1}"Help Desk"' |
            Set-Content $f -Encoding utf8
          Write-Host "en.rs: setup_server_tip → Help Desk"

          # 4. Icon — place app_icon.ico at assets/app_icon.ico in the fork root
          if (Test-Path "assets\app_icon.ico") {
            # Flutter app icon (taskbar, inner exe)
            Copy-Item "assets\app_icon.ico" "flutter\windows\runner\resources\app_icon.ico" -Force
            # Portable launcher icon (exe file icon in Explorer)
            Copy-Item "assets\app_icon.ico" "res\icon.ico" -Force
            # Flutter asset — ends up at data\flutter_assets\assets\icon.ico inside the
            # portable bundle. When the user clicks Install, RustDesk's install flow XCOPYs
            # the whole data\ folder and get_custom_icon() in src/platform/windows.rs looks
            # for exactly this path to set the shortcut / registry DisplayIcon.
            New-Item -ItemType Directory -Force -Path "flutter\assets" | Out-Null
            Copy-Item "assets\app_icon.ico" "flutter\assets\icon.ico" -Force
            # System tray icon — RustDesk trayManager.setIcon() uses assets/logo.ico
            Copy-Item "assets\app_icon.ico" "flutter\assets\logo.ico" -Force
            $lines = Get-Content "flutter\pubspec.yaml"
            if (($lines | Select-String 'assets/icon\.ico').Count -eq 0) {
              $out = [System.Collections.Generic.List[string]]::new()
              $inFlutter = $false; $added = $false
              foreach ($ln in $lines) {
                if ($ln -match '^flutter:') { $inFlutter = $true }
                elseif ($ln -match '^\S') { $inFlutter = $false }
                if ($inFlutter -and !$added -and $ln -match '^\s+assets:\s*$') {
                  $out.Add($ln); $out.Add("    - assets/icon.ico"); $added = $true; continue
                }
                $out.Add($ln)
              }
              Set-Content "flutter\pubspec.yaml" -Value $out -Encoding utf8
              if ($added) { Write-Host "Icon: added assets/icon.ico entry to pubspec.yaml" }
              else { Write-Host "Warning: flutter.assets section not found — pubspec.yaml unchanged" }
            }
            Write-Host "Icon: replaced (Flutter + portable launcher + Flutter asset for Install)"
          } else {
            Write-Host "No icon found at assets/app_icon.ico — using default"
          }

          # 5. In-app title bar SVG icon
          if (Test-Path "assets\polished_logo.svg") {
            Copy-Item "assets\polished_logo.svg" "flutter\assets\icon.svg" -Force
            Write-Host "SVG icon: replaced"
          } else {
            Write-Host "No SVG found at assets/polished_logo.svg — using default"
          }

      # ── Restrictions: incoming-only + lock local settings ────────────────────
      - name: Apply restrictions (incoming-only, lock settings)
        shell: pwsh
        run: |
          # 1. Replace right panel with branded info panel
          $f = "flutter\lib\desktop\pages\desktop_home_page.dart"
          $c = Get-Content $f -Raw
          $phone          = "${{ env.SUPPORT_PHONE }}"
          $websiteUrl     = "${{ env.WEBSITE_URL }}"
          $bannerLabel    = "${{ env.BANNER_LABEL }}"
          $bannerUrlText  = "${{ env.BANNER_URL_TEXT }}"
          $panel = @(
            'Expanded(',
            '              child: Container(',
            '                decoration: BoxDecoration(',
            '                  color: Color(0xFF242424),',
            '                  border: Border(left: BorderSide(color: Color(0xFF2D2D2D))),',
            '                ),',
            '                padding: EdgeInsets.all(24),',
            '                child: Column(',
            '                  mainAxisAlignment: MainAxisAlignment.start,',
            '                  crossAxisAlignment: CrossAxisAlignment.start,',
            '                  children: [',
            '                    Row(children: [',
            '                      Icon(Icons.headset_mic_outlined, color: Color(0xFF6366F1), size: 20),',
            '                      SizedBox(width: 8),',
            "                      Text('Fred the IT Guy', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 15, color: Color(0xFFF1F5F9))),",
            '                    ]),',
            '                    SizedBox(height: 20),',
            "                    Text('While you wait...', style: TextStyle(fontWeight: FontWeight.w600, fontSize: 13, color: Color(0xFFCBD5E1))),",
            '                    SizedBox(height: 12),',
            '                    Row(crossAxisAlignment: CrossAxisAlignment.start, children: [',
            '                      Icon(Icons.fiber_manual_record, color: Color(0xFF6366F1), size: 8),',
            '                      SizedBox(width: 8),',
            "                      Expanded(child: Text('Your technician will connect shortly.', style: TextStyle(fontSize: 12, color: Color(0xFF94A3B8)))),",
            '                    ]),',
            '                    SizedBox(height: 6),',
            '                    Row(crossAxisAlignment: CrossAxisAlignment.start, children: [',
            '                      Icon(Icons.fiber_manual_record, color: Color(0xFF6366F1), size: 8),',
            '                      SizedBox(width: 8),',
            "                      Expanded(child: Text('Keep this window open.', style: TextStyle(fontSize: 12, color: Color(0xFF94A3B8)))),",
            '                    ]),',
            '                    SizedBox(height: 6),',
            '                    Row(crossAxisAlignment: CrossAxisAlignment.start, children: [',
            '                      Icon(Icons.fiber_manual_record, color: Color(0xFF6366F1), size: 8),',
            '                      SizedBox(width: 8),',
            "                      Expanded(child: Text('You may see your screen being controlled - this is normal.', style: TextStyle(fontSize: 12, color: Color(0xFF94A3B8)))),",
            '                    ]),',
            '                    SizedBox(height: 6),',
            '                    Row(crossAxisAlignment: CrossAxisAlignment.start, children: [',
            '                      Icon(Icons.fiber_manual_record, color: Color(0xFF6366F1), size: 8),',
            '                      SizedBox(width: 8),',
            "                      Expanded(child: Text('Never share your ID or one-time password with anyone else.', style: TextStyle(fontSize: 12, color: Color(0xFF94A3B8)))),",
            '                    ]),',
            '                    SizedBox(height: 20),',
            '                    Divider(color: Color(0xFF2D2D2D)),',
            '                    SizedBox(height: 12),',
            "                    Text('Need help? Contact:', style: TextStyle(fontWeight: FontWeight.w600, fontSize: 13, color: Color(0xFFCBD5E1))),",
            '                    SizedBox(height: 8),',
            '                    Row(children: [',
            '                      Icon(Icons.phone_outlined, color: Color(0xFF6366F1), size: 16),',
            '                      SizedBox(width: 8),',
            "                      Text('$phone', style: TextStyle(fontSize: 14, fontWeight: FontWeight.w500, color: Color(0xFFF1F5F9))),",
            '                    ]),',
            '                    SizedBox(height: 16),',
            '                    Expanded(',
            '                      child: MouseRegion(',
            '                        cursor: SystemMouseCursors.click,',
            '                        child: GestureDetector(',
            "                          onTap: () => launchUrl(Uri.parse('$websiteUrl')),",
            '                          child: Container(',
            '                            width: double.infinity,',
            '                            decoration: BoxDecoration(',
            '                              gradient: LinearGradient(',
            '                                begin: Alignment.topLeft,',
            '                                end: Alignment.bottomRight,',
            '                                colors: [Color(0xFF4338CA), Color(0xFF312E81)],',
            '                              ),',
            '                              borderRadius: BorderRadius.circular(8),',
            '                            ),',
            '                            child: Column(',
            '                              mainAxisAlignment: MainAxisAlignment.center,',
            '                              children: [',
            '                                Icon(Icons.language_outlined, color: Color(0xFF6366F1), size: 22),',
            '                                SizedBox(height: 6),',
            '                                Row(mainAxisSize: MainAxisSize.min, children: [',
            "                                  Text('$bannerLabel', style: TextStyle(fontSize: 13, fontWeight: FontWeight.w600, color: Color(0xFFFFFFFF))),",
            '                                  SizedBox(width: 4),',
            '                                  Icon(Icons.open_in_new, color: Color(0xCCFFFFFF), size: 13),',
            '                                ]),',
            '                                SizedBox(height: 4),',
            "                                Text('$bannerUrlText', style: TextStyle(fontSize: 11, color: Color(0xB3FFFFFF))),",
            '                              ],',
            '                            ),',
            '                          ),',
            '                        ),',
            '                      ),',
            '                    ),',
            '                    SizedBox(height: 12),',
            '                    Container(',
            '                      height: 16,',
            '                      decoration: BoxDecoration(',
            '                        gradient: LinearGradient(',
            '                          colors: [Color(0xFF252350), Color(0xFF1A1840)],',
            '                        ),',
            '                        borderRadius: BorderRadius.circular(4),',
            '                      ),',
            '                    ),',
            '                  ],',
            '                ),',
            '              ),',
            '            )'
          ) -join "`n"
          $c = $c.Replace('if (!isIncomingOnly) Expanded(child: buildRightPane(context))', $panel)
          $c | Set-Content $f -Encoding utf8
          Write-Host "desktop_home_page.dart: right panel replaced with info panel"

          # Ensure url_launcher is imported (needed for banner tap handler)
          # Check for the specific launchUrl import, not just any url_launcher reference
          $c = Get-Content $f -Raw
          if ($c -notmatch "import 'package:url_launcher/url_launcher.dart'") {
            $c = "import 'package:url_launcher/url_launcher.dart';`n" + $c
            $c | Set-Content $f -Encoding utf8
            Write-Host "desktop_home_page.dart: added url_launcher import"
          } else {
            Write-Host "desktop_home_page.dart: url_launcher already imported"
          }

          # 2. Hide update notification card (belt-and-suspenders alongside Rust config option)
          $f = "flutter\lib\desktop\pages\desktop_home_page.dart"
          (Get-Content $f -Raw) -replace 'bind\.mainGetNewVersion\(\)\.isNotEmpty', 'false' |
            Set-Content $f -Encoding utf8
          Write-Host "desktop_home_page.dart: update notification card hidden"

          # 3. Settings tabs — keep only General and About
          # Hides Security, Network, Display, Printer so end user can't change permissions or server
          $f = "flutter\lib\desktop\pages\desktop_setting_page.dart"
          $c = Get-Content $f -Raw
          $before = $c
          $startMark = 'static final List<SettingsTabKey> tabKeys = ['
          $startIdx  = $c.IndexOf($startMark)
          if ($startIdx -ge 0) {
            $endIdx = $c.IndexOf('];', $startIdx)
            if ($endIdx -ge 0) {
              $newList = $startMark + "`n    SettingsTabKey.general,`n    SettingsTabKey.about,`n  ];"
              $c = $c.Substring(0, $startIdx) + $newList + $c.Substring($endIdx + 2)
            }
          }
          $c | Set-Content $f -Encoding utf8
          if ($c -eq $before) {
            Write-Host "Warning: tabKeys pattern not matched in desktop_setting_page.dart — tabs unchanged"
          } else {
            Write-Host "desktop_setting_page.dart: settings tabs reduced to General + About"
          }

      # ── Window size ───────────────────────────────────────────────────────────
      - name: Shrink default window width
        shell: pwsh
        run: |
          $f = "flutter\lib\common.dart"
          $c = Get-Content $f -Raw
          $before = $c
          # Default main window is 1280x720 — shrink to 500x600 to fit our custom info panel.
          $c = $c -replace '(\(isDesktop \|\| isWebDesktop\) \? )1280', '${1}500'
          $c = $c -replace '(\(isDesktop \|\| isWebDesktop\) \? )720',  '${1}600'
          $c | Set-Content $f -Encoding utf8
          if ($c -eq $before) {
            Write-Host "Warning: window size patterns not matched — skipping"
          } else {
            Write-Host "common.dart: default window size 1280x720 → 500x600"
          }

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build RustDesk (Flutter + Rust)
        run: python .\build.py --portable --hwcodec --flutter --vram
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
          LIBCLANG_PATH: C:\llvm\bin

      # ── Collect and rename output ─────────────────────────────────────────────
      - name: Collect output exe
        shell: pwsh
        run: |
          Write-Host "=== Build outputs ==="
          Get-ChildItem "*.exe" -ErrorAction SilentlyContinue | Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

          # Prefer portable; fall back to installer (both contain the full app)
          $src = $null
          $kind = ""

          $portable = Get-ChildItem "rustdesk_portable.exe" -ErrorAction SilentlyContinue
          if ($portable) {
            $src  = $portable.FullName
            $kind = "portable"
          } else {
            $installer = Get-ChildItem "rustdesk-*-install.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($installer) {
              $src  = $installer.FullName
              $kind = "installer (portable build failed — deploy with /S for silent install)"
            }
          }

          if ($src) {
            Copy-Item $src "Fred_the_IT_Guy.exe" -Force
            $mb = [math]::Round((Get-Item "Fred_the_IT_Guy.exe").Length/1MB, 1)
            Write-Host "Collected Fred_the_IT_Guy.exe ($mb MB) [$kind]"
          } else {
            Write-Error "No output exe found — check build logs above"
          }

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload Fred_the_IT_Guy.exe
        uses: actions/upload-artifact@v4
        with:
          name: Fred_the_IT_Guy
          path: Fred_the_IT_Guy.exe
          retention-days: 90
          if-no-files-found: error
