name: Build Fred the IT Guy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  RUST_VERSION:    "1.75.0"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION:    "15.0.6"
  VCPKG_COMMIT:    "120deac3062162151622ca4860575a33844ba10b"
  PORTAL_URL:      "https://help.fredtheitguy.com"
  # ── Branding (change these to rebrand for another deployment) ──────────────
  APP_NAME:        "Fred the IT Guy"   # exe metadata / about screen
  APP_TITLE:       "Fred IT Support"   # window title bar
  # Optional icon: commit a file to clients/rustdesk-build/app_icon.ico and it
  # will automatically replace the default RustDesk icon in the build.

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 150

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout fork with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── Cache: vcpkg binary cache ──────────────────────────────────────────────
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-${{ env.VCPKG_COMMIT }}-x64-windows-static
          restore-keys: vcpkg-${{ env.VCPKG_COMMIT }}-

      # ── Cache: Rust registry + build cache ────────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ env.RUST_VERSION }}-

      # ── Rust ──────────────────────────────────────────────────────────────────
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      # ── LLVM ──────────────────────────────────────────────────────────────────
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}
          directory: C:\llvm

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:\llvm\bin" >> $env:GITHUB_ENV

      # ── Flutter ───────────────────────────────────────────────────────────────
      - name: Install Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Flutter precache (Windows)
        run: flutter precache --windows

      # ── Custom Flutter engine (required for RustDesk) ─────────────────────────
      - name: Download RustDesk custom Flutter engine
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip" `
            -OutFile "$env:TEMP\rd-engine.zip" `
            -UseBasicParsing

      - name: Install custom Flutter engine
        run: |
          $flutterRoot  = (Get-Command flutter).Source | Split-Path | Split-Path
          $engineDest   = "$flutterRoot\bin\cache\artifacts\engine\windows-x64-release"
          New-Item -ItemType Directory -Force -Path $engineDest | Out-Null
          Expand-Archive -Path "$env:TEMP\rd-engine.zip" -DestinationPath "$env:TEMP\rd-engine" -Force
          Copy-Item -Path "$env:TEMP\rd-engine\*" -Destination $engineDest -Force
          Write-Host "Custom engine installed to $engineDest"

      # ── Flutter dropdown-menu patch (3.24.4/3.24.5) ───────────────────────────
      - name: Apply Flutter dropdown patch
        run: |
          $patch = ".github\patches\flutter_3.24.4_dropdown_menu_enableFilter.diff"
          if (Test-Path $patch) {
            $flutterRoot = (Get-Command flutter).Source | Split-Path | Split-Path
            Copy-Item $patch $flutterRoot
            Push-Location $flutterRoot
            git apply "flutter_3.24.4_dropdown_menu_enableFilter.diff" 2>$null || true
            Pop-Location
            Write-Host "Flutter patch applied"
          } else {
            Write-Host "Patch file not found — skipping"
          }

      # ── vcpkg ─────────────────────────────────────────────────────────────────
      - name: Setup vcpkg at pinned commit
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgDirectory: C:\vcpkg

      - name: Install vcpkg dependencies (x64-windows-static)
        run: |
          C:\vcpkg\vcpkg install `
            --triplet x64-windows-static `
            --x-install-root="C:\vcpkg\installed"
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static

      # ── Add ureq HTTP client (used for phone-home registration) ─────────────────
      - name: Add ureq to Cargo.toml
        shell: pwsh
        run: |
          $cargo = Get-Content "Cargo.toml" -Raw
          if ($cargo -notmatch '"ureq"') {
            $cargo = $cargo -replace '(\[dependencies\])', "[dependencies]`nureq = { version = `"2`", features = [`"tls`"] }"
            $cargo | Set-Content "Cargo.toml" -Encoding utf8
            Write-Host "Added ureq to Cargo.toml"
          } else {
            Write-Host "ureq already present"
          }

      # ── Patch src/common.rs: relay server + phone-home ────────────────────────
      # WHY common.rs and not main.rs:
      #   Flutter builds compile src/ into librustdesk.dll (library crate).
      #   src/main.rs is a dead binary stub — fn main() never runs in a Flutter build.
      #   The real Flutter startup path is: C++ WinMain → Dart → initialize() in
      #   flutter_ffi.rs → load_custom_client() in common.rs.  Injecting here is the
      #   only place that is guaranteed to execute.
      - name: Patch src/common.rs (relay server + phone-home registration)
        shell: pwsh
        env:
          RUSTDESK_HOST: ${{ secrets.RUSTDESK_HOST }}
          RUSTDESK_KEY:  ${{ secrets.RUSTDESK_KEY }}
        run: |
          $h      = $env:RUSTDESK_HOST
          $k      = $env:RUSTDESK_KEY
          $portal = "${{ env.PORTAL_URL }}"
          $f      = "src\common.rs"
          $c      = Get-Content $f -Raw
          $before = $c

          # Rust block injected as the first lines of load_custom_client().
          # PowerShell expands $h, $k, $portal at workflow runtime; everything
          # else is literal Rust source.
          $inject = @"

              // ── Fred IT Guy: compiled-in relay server ────────────────────────────
              // EXE_RENDEZVOUS_SERVER is priority #1 in get_rendezvous_servers() —
              // it overrides custom-rendezvous-server, cloud push, and all fallbacks.
              *hbb_common::config::EXE_RENDEZVOUS_SERVER.write().unwrap() = "$h".to_owned();
              if !"$k".is_empty() {
                  hbb_common::config::Config::set_option("key".to_owned(), "$k".to_owned());
              }
              // ── Fred IT Guy: phone-home registration ─────────────────────────────
              // Spawns a background thread; waits 10 s for the peer ID to appear
              // (requires hbbs to be reachable), then POSTs to the portal once.
              std::thread::spawn(|| {
                  std::thread::sleep(std::time::Duration::from_secs(10));
                  let id = hbb_common::config::Config::get_id();
                  if id.is_empty() { return; }
                  let machine = std::env::var("COMPUTERNAME").unwrap_or_else(|_| "Unknown".to_owned());
                  let id_c   = id.replace('"', "");
                  let name_c = machine.replace('"', "").replace('\\', "");
                  let body   = format!(
                      r#"{{"client_id":"{}","machine_name":"{}","code":""}}"#,
                      id_c, name_c
                  );
                  for attempt in 0..3u8 {
                      if let Ok(resp) = ureq::post(&format!("{}/api/register", "$portal"))
                          .set("Content-Type", "application/json")
                          .timeout(std::time::Duration::from_secs(10))
                          .send_string(&body) {
                          if resp.status() < 400 { return; }
                      }
                      if attempt < 2 { std::thread::sleep(std::time::Duration::from_secs(60)); }
                  }
              });
          "@

          # Use String.Replace() rather than -replace regex to avoid
          # backreference escaping issues with the multi-line $inject.
          $target = [regex]::Match($c, 'pub fn load_custom_client\(\)[^{]*\{').Value
          if (!$target) {
            Write-Error "load_custom_client() not found in $f — function may have been renamed"
            Select-String -Path $f -Pattern "load_custom_client" | Select-Object -First 5 | % { Write-Host $_.Line }
            exit 1
          }
          $c = $c.Replace($target, $target + $inject)
          $c | Set-Content $f -Encoding utf8

          if ($c -eq $before) {
            Write-Error "src/common.rs was not modified — String.Replace() found no match"
            exit 1
          }
          Write-Host "Patched load_custom_client() in src/common.rs"
          Write-Host "  EXE_RENDEZVOUS_SERVER = $h"
          Write-Host "  Portal = $portal"

      # ── Generate bridge_generated.rs (required, missing from fork) ────────────
      - name: Flutter pub get (required before bridge codegen)
        run: flutter pub get
        working-directory: flutter

      - name: Generate flutter_rust_bridge
        shell: pwsh
        env:
          LIBCLANG_PATH: C:\llvm\bin
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          flutter_rust_bridge_codegen `
            --rust-input src/flutter_ffi.rs `
            --dart-output flutter/lib/generated_bridge.dart
          Write-Host "bridge_generated.rs created"

      # ── Python build deps ─────────────────────────────────────────────────────
      - name: Install Python build dependencies
        run: python -m pip install --quiet requests argparse

      # ── Branding ──────────────────────────────────────────────────────────────
      # All values driven from env: block at the top — change those to rebrand.
      - name: Apply branding
        shell: pwsh
        run: |
          $name   = "${{ env.APP_NAME }}"
          $title  = "${{ env.APP_TITLE }}"
          $portal = "${{ env.PORTAL_URL }}"

          # 1. Window title (C++ runner)
          $f = "flutter\windows\runner\main.cpp"
          (Get-Content $f -Raw) -replace 'std::wstring app_name = L"RustDesk"', "std::wstring app_name = L`"$title`"" |
            Set-Content $f -Encoding utf8
          Write-Host "main.cpp: window title → $title"

          # 2. Exe metadata (right-click → Properties)
          $f = "flutter\windows\runner\Runner.rc"
          $c = Get-Content $f -Raw
          $c = $c -replace 'VALUE "FileDescription", "RustDesk[^"]*"', "VALUE `"FileDescription`", `"$name`""
          $c = $c -replace 'VALUE "ProductName", "RustDesk[^"]*"',     "VALUE `"ProductName`", `"$name`""
          $c | Set-Content $f -Encoding utf8
          Write-Host "Runner.rc: product name → $name"

          # 3. Remove the 'set up your own server' promo link
          #    - Redirect the URL so clicking it goes to the portal instead
          $f = "flutter\lib\desktop\pages\connection_page.dart"
          (Get-Content $f -Raw) -replace '"https://rustdesk\.com/pricing"', "`"$portal`"" |
            Set-Content $f -Encoding utf8
          Write-Host "connection_page.dart: promo URL → $portal"

          # 4. Clear the promo tip text (widget becomes invisible)
          $f = "src\lang\en.rs"
          (Get-Content $f -Raw) -replace '("setup_server_tip",\s*)"[^"]*"', '${1}""' |
            Set-Content $f -Encoding utf8
          Write-Host "en.rs: setup_server_tip cleared"

          # 5. Icon — place app_icon.ico at .github/assets/app_icon.ico in the fork
          $dst = "flutter\windows\runner\resources\app_icon.ico"
          if (Test-Path ".github\assets\app_icon.ico") {
            Copy-Item ".github\assets\app_icon.ico" $dst -Force
            Write-Host "Icon: replaced"
          } else {
            Write-Host "No icon found at .github/assets/app_icon.ico — using default"
          }

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build RustDesk (Flutter + Rust)
        run: python .\build.py --portable --hwcodec --flutter --vram
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
          LIBCLANG_PATH: C:\llvm\bin

      # ── Collect and rename output ─────────────────────────────────────────────
      - name: Collect output exe
        shell: pwsh
        run: |
          Write-Host "=== Build outputs ==="
          Get-ChildItem "*.exe" -ErrorAction SilentlyContinue | Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

          # Prefer portable; fall back to installer (both contain the full app)
          $src = $null
          $kind = ""

          $portable = Get-ChildItem "rustdesk_portable.exe" -ErrorAction SilentlyContinue
          if ($portable) {
            $src  = $portable.FullName
            $kind = "portable"
          } else {
            $installer = Get-ChildItem "rustdesk-*-install.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($installer) {
              $src  = $installer.FullName
              $kind = "installer (portable build failed — deploy with /S for silent install)"
            }
          }

          if ($src) {
            Copy-Item $src "Fred_the_IT_Guy.exe" -Force
            $mb = [math]::Round((Get-Item "Fred_the_IT_Guy.exe").Length/1MB, 1)
            Write-Host "Collected Fred_the_IT_Guy.exe ($mb MB) [$kind]"
          } else {
            Write-Error "No output exe found — check build logs above"
          }

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload Fred_the_IT_Guy.exe
        uses: actions/upload-artifact@v4
        with:
          name: Fred_the_IT_Guy
          path: Fred_the_IT_Guy.exe
          retention-days: 90
          if-no-files-found: error
